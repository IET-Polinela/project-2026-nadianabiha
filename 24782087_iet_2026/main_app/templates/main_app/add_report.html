{% extends "main_app/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="section-head">
    <div>
        <h2>{{ heading }}</h2>
        <p>Isi data laporan dengan lengkap agar proses verifikasi dan tindak lanjut berjalan lebih cepat.</p>
    </div>
</section>

<section class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit">{{ submit_label }}</button>
            <a class="btn btn-secondary" href="{% url 'report_list' %}">Kembali ke daftar laporan</a>
        </div>
    </form>
</section>
{% endblock %}
