{% extends "main_app/base.html" %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<section class="confirm-card">
    <h2 class="confirm-title">Hapus Laporan</h2>
    <p>Laporan <strong>"{{ report.title }}"</strong> akan dihapus permanen dari daftar. Pastikan data ini memang tidak lagi dibutuhkan.</p>

    <div class="form-actions">
        <form class="inline-form" method="post">
            {% csrf_token %}
            <button class="btn-danger" type="submit">Ya, Hapus</button>
        </form>
        <a class="btn btn-secondary" href="{% url 'report_list' %}">Batal</a>
    </div>
</section>
{% endblock %}
