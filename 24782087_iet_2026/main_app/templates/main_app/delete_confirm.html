<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hapus Laporan</title>
</head>
<body>
    <h1>Hapus Laporan</h1>
    <p>Apakah kamu yakin ingin menghapus laporan "{{ report.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Ya, Hapus</button>
    </form>

    <p><a href="{% url 'home' %}">Batal</a></p>
</body>
</html>
